<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — СМЫСЛ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Bounded";
      src: url("./app/assets/fonts/Bounded-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body { width: 100%; height: 100%; }

    body {
      background: #06080d;
      color: #fcf8c9;
      font-family: "Inter", sans-serif;
      overflow: hidden;
    }

    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right, rgba(7, 12, 24, 0.35), rgba(7, 12, 24, 0) 40%),
        repeating-linear-gradient(
          to right,
          rgba(33, 52, 95, 0.22) 0,
          rgba(33, 52, 95, 0.22) 1px,
          transparent 1px,
          transparent 48px
        );
      opacity: 0.35;
    }

    .frame {
      position: absolute;
      left: 130px;
      top: 210px;
      width: 720px;
      border: 1px solid rgba(252, 248, 201, 0.16);
      padding: 18px 18px 16px 18px;
      background: rgba(6, 8, 13, 0.28);
    }

    .label {
      font-size: 14px;
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
      color: #f3efbe;
      opacity: 0.95;
    }

    h1 {
      font-family: "Bounded", system-ui, sans-serif;
      font-size: 74px;
      line-height: 0.9;
      letter-spacing: -1.2px;
      margin-bottom: 10px;
      color: #f3efbe;
      text-transform: uppercase;
    }

    .lead {
      max-width: 560px;
      font-size: 36px;
      line-height: 0.98;
      letter-spacing: -0.2px;
      color: #f3efbe;
      margin-bottom: 14px;
      white-space: normal;
    }

    .home-btn {
      display: inline-flex;
      width: 420px;
      justify-content: center;
      align-items: center;
      border: 1px solid #f3efbe;
      color: #f3efbe;
      text-decoration: none;
      text-transform: uppercase;
      font-family: "Inter", sans-serif;
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0.01em;
      padding: 11px 18px;
      background: transparent;
    }

    @media (max-width: 1100px) {
      .frame {
        left: 72px;
        top: 180px;
        width: calc(100% - 144px);
      }
      h1 { font-size: clamp(48px, 7.2vw, 74px); }
      .lead { font-size: clamp(24px, 3.4vw, 36px); }
    }

    @media (max-width: 640px) {
      .grid {
        opacity: 0.28;
        background:
          linear-gradient(to right, rgba(7, 12, 24, 0.35), rgba(7, 12, 24, 0) 55%),
          repeating-linear-gradient(to right, rgba(33, 52, 95, 0.2) 0, rgba(33, 52, 95, 0.2) 1px, transparent 1px, transparent 34px);
      }
      .frame {
        left: 12px;
        top: 150px;
        width: calc(100% - 24px);
        padding: 14px 12px 14px 12px;
      }
      .label { font-size: 12px; }
      h1 {
        font-size: clamp(38px, 12vw, 58px);
        line-height: 0.92;
      }
      .lead {
        max-width: 100%;
        font-size: clamp(20px, 7vw, 32px);
        line-height: 0.98;
      }
      .home-btn {
        width: 100%;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>
  <main class="frame" aria-labelledby="not-found-title">
    <p class="label">[ 404 ]</p>
    <h1 id="not-found-title">ОЙ. СМЫСЛА<br>ЗДЕСЬ НЕТ.</h1>
    <p class="lead">Похоже, адрес ушёл в правки раньше, чем мы успели согласовать финальную версию.</p>
    <a class="home-btn" href="./index.html">НА ГЛАВНУЮ</a>
  </main>
</body>
</html>
