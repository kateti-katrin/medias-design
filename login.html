<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — СМЫСЛ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script src="./login.js" defer></script>
</head>
<body>
  <div class="auth-page">
    <a href="./index.html" class="auth-back">← на главную</a>

    <main class="auth-card">
      <header class="auth-card__header">
        <p class="auth-card__overline">[ Личный кабинет ]</p>
        <h1 class="auth-card__title">С возвращением в смысл</h1>
        <p class="auth-card__lead">Здесь ждут твои ТЗ, расчёты бюджета и статьи, которые помогли разобраться. Войди, чтобы продолжить.</p>
      </header>

      <form class="auth-form" id="login-form" novalidate>
        <label class="auth-field">
          <span>Логин или email</span>
          <input type="text" name="login" required autocomplete="username" id="login-login">
        </label>

        <label class="auth-field">
          <span>Пароль</span>
          <div class="auth-password">
            <input type="password" name="password" required autocomplete="current-password" id="login-password">
            <button type="button" class="auth-password__toggle" id="login-password-toggle" aria-label="Показать пароль" aria-pressed="false">
              <svg class="auth-password__icon auth-password__icon--show" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="auth-password__icon auth-password__icon--hide" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.05 10.05 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 4.07-5.16"></path>
                <path d="M9.9 5.08A10.43 10.43 0 0 1 12 5c7 0 11 7 11 7a18.46 18.46 0 0 1-2.16 3.19"></path>
                <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </label>

        <button type="submit" class="btn btn--primary auth-submit">Войти</button>
      </form>

      <p class="auth-secondary">
        <span>Ещё не с нами?</span>
        <a href="./register.html" class="auth-link">Зарегистрироваться</a>
      </p>

      <div class="auth-divider"><span>или войти через</span></div>

      <div class="auth-socials">
        <button type="button" class="auth-social" data-provider="google" aria-label="Войти через Google">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.4c-.2 1.2-.9 2.2-2 2.9v2.4h3.2c1.9-1.7 2.9-4.3 2.9-7.2z"></path>
            <path d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.4c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.1v2.5C4.7 19.8 8.1 22 12 22z"></path>
            <path d="M6.4 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.5H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.5L6.4 14z"></path>
            <path d="M12 6c1.5 0 2.8.5 3.8 1.5l2.9-2.9C16.9 2.9 14.6 2 12 2 8.1 2 4.7 4.2 3.1 7.5L6.4 10c.8-2.4 3-4 5.6-4z"></path>
          </svg>
          <span>Google</span>
        </button>

        <button type="button" class="auth-social" data-provider="vk" aria-label="Войти через ВКонтакте">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M2 6.5C2 4 4 2 6.5 2h11C20 2 22 4 22 6.5v11c0 2.5-2 4.5-4.5 4.5h-11C4 22 2 20 2 17.5v-11zm10.4 11h1.3c.4 0 .5-.3.5-.6 0-.6.3-1.5 1-1.5.6 0 1.2.7 1.7 1.4.4.5.6.7 1.1.7h2.3c.7 0 .7-.4.5-.9-.1-.4-1.6-2.4-2.6-3.4-.4-.5-.2-.7 0-1 0 0 2-2.7 2.2-3.6.1-.4 0-.7-.5-.7h-2.3c-.5 0-.7.3-.9.6 0 0-1.1 2.3-2.4 3.8-.4.4-.6.6-.9.6-.1 0-.3-.2-.3-.6V8.6c0-.5-.1-.7-.5-.7H8.7c-.3 0-.5.2-.5.4 0 .4.7.5.7 1.8v2.7c0 .6-.1.7-.3.7-.7 0-2.2-2.3-3-4.8-.2-.6-.4-.8-.9-.8h-2c-.6 0-.7.3-.7.6 0 .5.6 3 3 6.4 1.6 2.4 3.8 3.6 5.9 3.6z"></path>
          </svg>
          <span>ВКонтакте</span>
        </button>
      </div>
    </main>
  </div>
</body>
</html>
