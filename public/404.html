<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Смысла здесь нет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Bounded';
      src: url('/Bounded-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fcf8c9;
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    .ghost {
      position: absolute;
      font-family: 'Bounded', system-ui, sans-serif;
      font-size: clamp(160px, 28vw, 400px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #fcf8c9;
      opacity: 0.05;
      user-select: none;
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      max-width: 600px;
    }

    h1 {
      font-family: 'Bounded', system-ui, sans-serif;
      font-size: clamp(32px, 5.5vw, 72px);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: #fcf8c9;
    }

    .subtitle {
      font-size: clamp(14px, 1.6vw, 18px);
      line-height: 1.5;
      color: #fcf8c9;
      opacity: 0.55;
      max-width: 400px;
    }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fcf8c9;
      opacity: 0.65;
      text-decoration: none;
      border-bottom: 1px solid rgba(252, 248, 201, 0.3);
      padding-bottom: 2px;
      transition: opacity 0.15s;
    }

    .back-link:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="ghost" aria-hidden="true">404</div>
  <div class="content">
    <h1>Ой. Смысла здесь нет.</h1>
    <p class="subtitle">Страница пропала — возможно, без брифа и без дедлайна. Такое бывает.</p>
    <a href="/" class="back-link">← на главную</a>
  </div>
</body>
</html>
